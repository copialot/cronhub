services:
  cronhub:
    build: .
    ports:
      - "8080:8080"
    volumes:
      - cronhub-data:/app/data
    environment:
      - PORT=8080
      - DB_PATH=/app/data/cronhub.db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  cronhub-data:
