name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.os }}-${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - os: linux
            arch: amd64
            runner: ubuntu-latest
            goarch: amd64
          - os: linux
            arch: arm64
            runner: ubuntu-latest
            goarch: arm64
          - os: darwin
            arch: amd64
            runner: macos-latest
            goarch: amd64
          - os: darwin
            arch: arm64
            runner: macos-latest
            goarch: arm64

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Build frontend
        run: |
          cd web
          pnpm install
          pnpm build

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Install cross-compiler (Linux ARM64)
        if: matrix.os == 'linux' && matrix.arch == 'arm64'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build binary
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 1
        run: |
          if [ "${{ matrix.os }}" = "linux" ] && [ "${{ matrix.arch }}" = "arm64" ]; then
            export CC=aarch64-linux-gnu-gcc
          fi
          cd server
          go build -ldflags "-s -w -X main.Version=${GITHUB_REF_NAME}" -o ../cronhub .

      - name: Compress binary
        run: |
          tar czf cronhub-${{ matrix.os }}-${{ matrix.arch }}.tar.gz \
            cronhub \
            install.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cronhub-${{ matrix.os }}-${{ matrix.arch }}
          path: cronhub-${{ matrix.os }}-${{ matrix.arch }}.tar.gz

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/**/*.tar.gz
